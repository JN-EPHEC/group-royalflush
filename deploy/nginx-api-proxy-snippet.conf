# À inclure DANS le bloc server { } de blog.l1-7.ephec-ti.be,
# AVANT le location / { try_files ... } (ordre important).
#
# Prérequis : Node (Docker royalflush-api) écoute sur 127.0.0.1:3000

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api-docs {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /me {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /setup/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # POST → API ; GET → SPA. Dans limit_except, Nginx n’accepte que peu de directives
    # (pas proxy_http_version / proxy_set_header) — seul proxy_pass ici.
    location = /register {
        limit_except GET {
            proxy_pass http://127.0.0.1:3000;
        }
        try_files $uri $uri/ /index.html;
    }

    location = /login {
        limit_except GET {
            proxy_pass http://127.0.0.1:3000;
        }
        try_files $uri $uri/ /index.html;
    }
