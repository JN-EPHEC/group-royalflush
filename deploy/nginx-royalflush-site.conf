# Exemple de site Nginx pour Royal Flush.
# Copier / adapter dans /etc/nginx/sites-available/royalflush
# puis : sudo ln -s .../royalflush /etc/nginx/sites-enabled/
#
# Inclure le proxy API AVANT le bloc location / (SPA).

server {
    listen 80;
    listen [::]:80;
    server_name blog.l1-7.ephec-ti.be;

    root /var/www/royalflush;
    index index.html;

    # --- Proxy API (voir nginx-api-proxy-snippet.conf) ---
    include /etc/nginx/snippets/royalflush-api-proxy.conf;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Avec HTTPS (certbot) : dupliquer le bloc server sur listen 443 ssl
# et rediriger le port 80 vers https.
