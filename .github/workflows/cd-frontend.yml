name: Continuous Deployment - Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies and Build
        env:
          # Même origine que le blog ; l’API est proxifiée par Nginx (snippet deploy/nginx-api-proxy-snippet.conf)
          VITE_API_URL: ""
        run: |
          npm ci
          npm run build
        working-directory: ./client

      # SCP vers le home (écriture OK) — pas directement sous /var/www (souvent root:www-data → Permission denied)
      - name: Upload dist to VPS (home)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          port: 54321
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "client/dist/*"
          target: "/home/${{ secrets.SERVER_USER }}/dist-upload/"
          strip_components: 2

      # Adapte WEB_ROOT si ton Nginx utilise autre chose (ex. /var/www/html). Sudo sans mot de passe requis pour ces commandes.
      - name: Install under /var/www (sudo)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          port: 54321
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            WEB_ROOT=/var/www/royalflush
            sudo mkdir -p "$WEB_ROOT"
            sudo rm -rf "$WEB_ROOT"/*
            sudo cp -r /home/${{ secrets.SERVER_USER }}/dist-upload/* "$WEB_ROOT"/
            sudo chown -R www-data:www-data "$WEB_ROOT"
            sudo nginx -t && sudo systemctl reload nginx
